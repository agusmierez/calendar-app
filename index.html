<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>TU calendario</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    </head>
    <body>

        <div id="app">

            <!-- 📚 SIDEBAR -->
            <aside id="sidebar" class="hidden">
                <h3>Años</h3>
                <div id="yearsList"></div>
            </aside>

            <!-- 📱 MAIN -->
            <main id="main">

                <header id="topbar">
                    <button id="menuBtn">☰</button>
                    <button id="todayBtn">HOY</button>
                    <div id="monthControls">
                        <button id="prevMonth">◀</button>
                        <span id="monthLabel"></span>
                        <button id="nextMonth">▶</button>
                    </div>

                    <input type="color" id="colorPicker">

                </header>

                <div id="weekdays">
                <div>Lun</div><div>Mar</div><div>Mié</div>
                <div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
                </div>

                <div id="calendar"></div>

                <div id="events-summary">
                <strong>Próximos eventos:</strong>
                <ul id="events-list">
                    <!-- se llenará dinámicamente con JS -->
                </ul>
                </div>

            </main>
        </div>

        <!-- 🪟 MODAL -->
        <div id="eventModal" class="modal hidden">
            <div class="modal-content">
                <input id="modalInput" type="text" />

                <button id="saveBtn">Guardar</button>
                <button id="deleteBtn">Borrar</button>
                <button id="closeBtn">Cerrar</button>
            </div>
        </div>

        <script type="module" src="main.js"></script>
    </body>
</html>
