<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Calendario</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div id="app">

            <!-- 📚 SIDEBAR -->
            <aside id="sidebar" class="hidden">
                <h3>Años</h3>
                <div id="yearsList"></div>
            </aside>

            <!-- 📱 MAIN -->
            <main id="main">

                <header id="topbar">
                    <button id="menuBtn">☰</button>
                    <div id="monthControls">
                        <button id="prevMonth">◀</button>
                        <span id="monthLabel"></span>
                        <button id="nextMonth">▶</button>
                    </div>

                </header>

                <div id="weekdays">
                <div>Lun</div><div>Mar</div><div>Mié</div>
                <div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
                </div>

                <div id="calendar"></div>

            </main>
        </div>

        <!-- 🪟 MODAL -->
        <div id="eventModal" class="modal hidden">
            <div class="modal-content">
                <p id="modalText"></p>

                <input id="modalInput" type="text" />

                <button id="saveBtn">Guardar</button>
                <button id="deleteBtn">Borrar</button>
                <button id="closeBtn">Cerrar</button>
            </div>
        </div>

        <script type="module" src="main.js"></script>
    </body>
</html>
